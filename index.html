<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#03190f" />
  <title>Yazan's WC Tracker ⚽ World Cup 2026</title>
  <meta name="description" content="Yazan's WC Tracker — World Cup 2026 matches, standings & live scores." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <div class="fx" aria-hidden="true">
    <div class="fx__blob fx__blob--1"></div>
    <div class="fx__blob fx__blob--2"></div>
    <div class="fx__stripes"></div>
  </div>

  <header class="hero">
    <div class="hero__top">
      <div class="brand">
        <span class="brand__badge">
          <svg class="brand__ball" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6">
            <circle cx="12" cy="12" r="9.2"/>
            <path d="M12 7.2l3.2 2.3-1.2 3.8h-4l-1.2-3.8L12 7.2Z" fill="currentColor" stroke="none"/>
            <path d="M12 7.2V4M15.2 9.5l3-1.6M13.8 13.3l2 3M10.2 13.3l-2 3M8.8 9.5l-3-1.6"/>
          </svg>
        </span>
        <div class="brand__text">
          <span class="brand__name">WC<span class="brand__26">26</span></span>
          <span class="brand__tag">Yazan's WC Tracker</span>
        </div>
      </div>
      <div class="hero__actions">
        <div class="hosts" aria-label="Hosted by Canada, USA and Mexico">
          <span>🇨🇦</span><span>🇺🇸</span><span>🇲🇽</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button" aria-label="Refresh live data">
          <svg class="refresh-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          <span class="refresh-btn__check" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
        </button>
      </div>
    </div>

    <h1 class="hero__title">Today's <em>Matches</em></h1>
    <p class="hero__hype" id="hypeLine">Loading the hype…</p>

    <div class="countdown" id="countdown" hidden>
      <svg class="countdown__icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/>
      </svg>
      <div class="countdown__body">
        <span class="countdown__label">Next kickoff</span>
        <span class="countdown__match" id="countdownMatch"></span>
      </div>
      <span class="countdown__time" id="countdownTime">--:--:--</span>
    </div>
  </header>

  <!-- Tab bar -->
  <div class="tabs" role="tablist" aria-label="View">
    <button class="tab tab--active" role="tab" aria-selected="true" data-tab="matches" id="tab-matches">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9.2"/>
        <path d="M12 7.2l3.2 2.3-1.2 3.8h-4l-1.2-3.8L12 7.2Z" fill="currentColor" stroke="none"/>
      </svg>
      Matches
    </button>
    <button class="tab" role="tab" aria-selected="false" data-tab="tables" id="tab-tables">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M9 22c0-2 .9-3 2-3.5V17M15 22c0-2-.9-3-2-3.5V17M8 22h8"/>
      </svg>
      Tables
    </button>
  </div>

  <!-- Team filter chip -->
  <div class="filter-chip" id="filterChip" hidden>
    <span class="filter-chip__label">Watching</span>
    <span class="filter-chip__team" id="filterChipTeam"></span>
    <button class="filter-chip__clear" id="filterChipClear" aria-label="Clear team filter" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Matches panel -->
  <nav class="datestrip" id="datestrip" aria-label="Pick a day"></nav>
  <main class="matches" id="matches" role="main"></main>

  <!-- Tables panel -->
  <section class="standings-wrap" id="standingsWrap" aria-label="Group standings" hidden></section>

  <footer class="foot">
    <p class="foot__main">
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M9 22c0-2 .9-3 2-3.5V17M15 22c0-2-.9-3-2-3.5V17M8 22h8"/>
      </svg>
      <span><strong>Yazan's WC Tracker</strong> · <span id="matchCount">0</span> matches · updated <span id="updated">—</span></span>
    </p>
    <p class="foot__hint">Live data via football-data.org · refreshes automatically</p>
  </footer>

  <script src="data.js?v=7"></script>
  <script src="app.js?v=7"></script>
</body>
</html>

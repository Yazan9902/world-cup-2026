name: Update WC26 matches

# Refreshes matches.json from football-data.org and commits it so the
# deployed site (GitHub Pages / Netlify / Cloudflare Pages) shows live data.
#
# SETUP (one time):
#   1. Push this folder to a GitHub repo.
#   2. Repo Settings → Secrets and variables → Actions → New repository secret
#      Name:  FOOTBALL_DATA_TOKEN
#      Value: <your football-data.org token>
#   3. Enable GitHub Pages (Settings → Pages → deploy from branch).
#
# Note: GitHub's scheduled runs fire about every ~5 min at best (and can be
# delayed under load). For second-by-second live scores, use a serverless
# proxy instead — see README. For most group-chat use, every few minutes is fine.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # lets you trigger it manually too

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest matches
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python3 fetch_matches.py

      - name: Commit if changed
        run: |
          git config user.name  "wc26-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet matches.json; then
            git add matches.json
            git commit -m "chore: refresh match data [skip ci]"
            git push
          else
            echo "No changes."
          fi

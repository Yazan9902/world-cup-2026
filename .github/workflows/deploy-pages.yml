name: Deploy to GitHub Pages

# Reliable Actions-based Pages deploy (replaces the flaky legacy
# "deploy from a branch" pipeline, which kept getting stuck in
# deployment_queued and timing out). Publishes the repo root as a
# static site on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Always let the newest deploy win; cancel any superseded in-flight
# one instead of stacking them up (which is what jammed the queue).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
